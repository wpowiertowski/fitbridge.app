name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

# Cancel in-progress runs for the same PR/branch -- prevents queuing multiple
# expensive macOS builds when commits are pushed rapidly (matches the
# convention in the sibling lumivault.app project).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# iOS 27 retarget (2026-07): local dev is on the Xcode 27 beta / Swift 6.4.
# GitHub now ships the beta on a dedicated preview image with the `xcode-27`
# runs-on label (actions/runner-images#14196), which the app job uses below.
# Package jobs stay on macos-26 pinned to an Xcode 26.x that IS on that
# image -- `swift test` builds for the macOS host, and the manifests
# deliberately stay at swift-tools-version 6.2, so those jobs don't need the
# preview image (see implementation-plan.md "Toolchain note").
# Available versions:
# https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
env:
  XCODE_VERSION: "26.4.1"

jobs:
  packages:
    name: swift test (${{ matrix.package }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package: [CoreModel, Secrets, GoogleHealthClient, SyncKit, CoachKit]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SwiftPM and SourcePackages
        uses: actions/cache@v5
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            Packages/${{ matrix.package }}/.build
          key: ${{ runner.os }}-swiftpm-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.resolved', matrix.package)) }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-${{ matrix.package }}-

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: swift test
        working-directory: Packages/${{ matrix.package }}
        # Warnings fail the build: CI must go red on warnings.
        run: swift test -Xswiftc -warnings-as-errors

  app:
    name: xcodebuild build test (HealthLoom scheme)
    # The app targets iOS 27, which needs the Xcode 27 beta's SDK. That ships
    # on GitHub's dedicated `xcode-27` preview image (arm64, macOS 26.5;
    # Xcode 27.0 beta is the image default), not on macos-26:
    # https://github.com/actions/runner-images/blob/releases/xcode-27/20260715/images/macos/xcode-27-Readme.md
    # Once Xcode 27 GA lands on the regular macos-26 image, move this job back
    # there (WP-38 toolchain-finalization checklist item).
    runs-on: xcode-27
    needs: packages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SwiftPM and SourcePackages
        uses: actions/cache@v5
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: ${{ runner.os }}-swiftpm-app-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-app-

      - name: Select Xcode 27
        # Xcode 27.0 beta is the image default, but select it explicitly so a
        # future default bump on the preview image can't silently change what
        # we build with.
        run: sudo xcode-select -s /Applications/Xcode_27.0.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select and pre-boot an iOS Simulator
        id: sim
        run: |
          set -euo pipefail
          # Prefer the largest iPhone model available, deterministically,
          # instead of `head -n1` of whatever simctl lists first: the UI
          # tests' scroll-into-view assertions depend on what fits above the
          # fold, so an arbitrary (possibly small) device made CI diverge
          # from local runs. Whichever iOS runtime the runner's Xcode ships
          # is fine as long as it satisfies the deploymentTarget (27.0).
          udid=""
          for name in "iPhone 17 Pro Max" "iPhone 17 Pro" "iPhone 17" "iPhone"; do
            udid=$(xcrun simctl list devices available \
              | grep -F "$name" \
              | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}' \
              | head -n1) && [ -n "$udid" ] && break
          done
          if [ -z "$udid" ]; then
            echo "::error::No available iPhone simulator found on this runner." >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "Selected simulator: $(xcrun simctl list devices available | grep -F "$udid")"
          # Kick off the boot now, without waiting, so springboard warms up
          # while xcodegen and the ~5 min build below run. Launching the
          # first UI-tested app on a cold-booting simulator timed out at
          # xcodebuild's launch deadline ("Timed out while launching
          # application via Xcode", PR #7 run 2) -- the simulator only
          # started booting when the first test asked it to.
          xcrun simctl boot "$udid" 2>/dev/null || true
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      - name: Generate Xcode project (xcodegen)
        run: |
          set -euo pipefail
          # xcodegen ships via Homebrew on GitHub's macOS runners; project.yml
          # is the committed source of truth, the .xcodeproj itself is not
          # committed here (unlike lumivault.app, which commits its .xcodeproj
          # directly -- HealthLoom deliberately regenerates it in CI instead,
          # to avoid .pbxproj merge conflicts across parallel work streams).
          brew install xcodegen
          xcodegen generate

      - name: Wait for simulator boot to finish
        # Usually instant -- the boot started before the build. `-b` boots
        # first if the earlier async boot somehow didn't stick.
        run: xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Build + test HealthLoom scheme
        run: |
          set -euo pipefail
          dest="platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"
          # -skip-testing:HealthLoomUITests (temporary, 2026-07): the app and
          # its UI-test bundle still BUILD (the scheme's build phase covers
          # all three targets), and the HealthLoomTests unit bundle still
          # runs on the simulator -- only the XCUITest suite is skipped. The
          # iOS 27 beta 3 runtime on this runner image does not deliver
          # XCUITest-synthesized taps to the out-of-process HealthKit
          # permission sheet (com.apple.HealthPrivacyService), so the
          # onboarding UI test cannot get past the Health Access sheet no
          # matter how it drives it -- full diagnosis in PR #7. UI tests
          # remain covered locally via `make test` (Xcode 27 beta). Remove
          # this flag when a newer beta lands on the image.
          xcodebuild build test \
            -project HealthLoom.xcodeproj \
            -scheme HealthLoom \
            -destination "$dest" \
            -skip-testing:HealthLoomUITests \
            -resultBundlePath "$RUNNER_TEMP/HealthLoom.xcresult" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      # UI-test failures are near-impossible to diagnose from stdout alone
      # (element-not-found waits log no hierarchy; the accessibility
      # snapshots and screenshots land in the result bundle) -- keep the
      # bundle when the job fails.
      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: HealthLoom.xcresult
          path: ${{ runner.temp }}/HealthLoom.xcresult
          if-no-files-found: ignore
