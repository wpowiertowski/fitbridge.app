name: CI

on:
  push:
    branches: [main]
  pull_request:

# WP-01 step 6 (implementation-plan.md): macOS runner, `swift test` per package,
# `xcodebuild build test` for the app scheme on an iOS 26 simulator, SPM caching,
# warnings treated as errors.
#
# Runner/Xcode pin: this repo targets Xcode 26 / Swift 6.2+ (iOS 26). Update
# `xcode-version` below once GitHub's hosted runner images publish the exact
# Xcode 26.x build you want to pin to -- `xcodebuild -version` on the runner
# must report Xcode 26 or newer for the `.defaultIsolation` / upcoming-feature
# flags in every Package.swift to be recognized.
env:
  XCODE_VERSION: "26.4"

jobs:
  packages:
    name: swift test (${{ matrix.package }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package: [CoreModel, Secrets, GoogleHealthClient, SyncKit, CoachKit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            Packages/${{ matrix.package }}/.build
          key: spm-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.resolved', matrix.package)) }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.package }}-

      - name: swift test
        working-directory: Packages/${{ matrix.package }}
        # Warnings fail the build (WP-01 step 6): CI must go red on warnings.
        run: swift test -Xswiftc -warnings-as-errors

  app:
    name: xcodebuild build test (FitBridge scheme)
    runs-on: macos-26
    needs: packages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whether the app project spec exists yet
        id: check
        run: |
          if [ -f "project.yml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        if: steps.check.outputs.exists == 'true'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Generate Xcode project (xcodegen)
        if: steps.check.outputs.exists == 'true'
        run: |
          set -euo pipefail
          # xcodegen ships via Homebrew on GitHub's macOS runners; project.yml
          # is the committed source of truth (WP-01 step 4), the .xcodeproj
          # itself is not committed (see .gitignore).
          brew install xcodegen
          xcodegen generate

      - name: Cache SPM artifacts (app + local packages)
        if: steps.check.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-app-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-app-${{ runner.os }}-

      - name: Select an available iOS Simulator runtime
        if: steps.check.outputs.exists == 'true'
        id: sim
        run: |
          set -euo pipefail
          # Pick any available iPhone simulator; whichever iOS runtime the
          # runner's Xcode ships is fine as long as it satisfies the app's
          # deploymentTarget (26.0).
          udid=$(xcrun simctl list devices available \
            | grep -E 'iPhone' \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}' \
            | head -n1)
          if [ -z "$udid" ]; then
            echo "::error::No available iPhone simulator found on this runner." >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      - name: Build + test FitBridge scheme
        if: steps.check.outputs.exists == 'true'
        run: |
          set -euo pipefail
          dest="platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"
          xcodebuild build test \
            -project FitBridge.xcodeproj \
            -scheme FitBridge \
            -destination "$dest" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Skip (no app project yet)
        if: steps.check.outputs.exists == 'false'
        run: echo "FitBridge.xcodeproj not present yet -- skipping app build/test job."
