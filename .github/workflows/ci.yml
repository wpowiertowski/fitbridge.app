name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

# Cancel in-progress runs for the same PR/branch -- prevents queuing multiple
# expensive macOS builds when commits are pushed rapidly (matches the
# convention in the sibling lumivault.app project).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# iOS 27 retarget (2026-07): local dev is on the Xcode 27 beta / Swift 6.4,
# but GitHub's macOS runners don't ship it yet (actions/runner-images#14196).
# Package jobs stay pinned to an Xcode 26.x that IS on the image -- `swift
# test` builds for the macOS host, and the manifests deliberately stay at
# swift-tools-version 6.2, so those jobs are unaffected by the iOS 27 bump.
# The app job needs the iOS 27 SDK, so it detects Xcode 27 on the runner and
# skips with a ::warning until the image ships it (see the app job below and
# implementation-plan.md "Toolchain note"). Available versions:
# https://github.com/actions/runner-images/blob/main/images/macos/macos-26-Readme.md
env:
  XCODE_VERSION: "26.4.1"

jobs:
  packages:
    name: swift test (${{ matrix.package }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package: [CoreModel, Secrets, GoogleHealthClient, SyncKit, CoachKit]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache SwiftPM and SourcePackages
        uses: actions/cache@v5
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            Packages/${{ matrix.package }}/.build
          key: ${{ runner.os }}-swiftpm-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.resolved', matrix.package)) }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-${{ matrix.package }}-

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: swift test
        working-directory: Packages/${{ matrix.package }}
        # Warnings fail the build: CI must go red on warnings.
        run: swift test -Xswiftc -warnings-as-errors

  app:
    name: xcodebuild build test (HealthLoom scheme)
    runs-on: macos-26
    needs: packages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # The app targets iOS 27, which needs the Xcode 27 beta's SDK. The
      # runner image doesn't ship it yet (actions/runner-images#14196), so
      # detect it and skip the build -- loudly -- rather than fail. Remove
      # this guard and pin XCODE_VERSION to 27.x once the image has it
      # (WP-38 toolchain-finalization checklist item).
      - name: Detect Xcode 27
        id: xcode27
        run: |
          set -euo pipefail
          latest=$(ls -d /Applications/Xcode_27*.app 2>/dev/null | sort -V | tail -n1 || true)
          if [ -n "$latest" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "path=$latest" >> "$GITHUB_OUTPUT"
            echo "Found $latest"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=iOS 27 app build skipped::No Xcode 27 beta on this runner image yet (actions/runner-images#14196). Package tests above still ran. Build the app scheme locally with the Xcode 27 beta."
          fi

      - name: Cache SwiftPM and SourcePackages
        if: steps.xcode27.outputs.available == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: ${{ runner.os }}-swiftpm-app-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-app-

      - name: Select Xcode 27
        if: steps.xcode27.outputs.available == 'true'
        run: sudo xcode-select -s "${{ steps.xcode27.outputs.path }}"

      - name: Show Xcode version
        if: steps.xcode27.outputs.available == 'true'
        run: xcodebuild -version

      - name: Generate Xcode project (xcodegen)
        if: steps.xcode27.outputs.available == 'true'
        run: |
          set -euo pipefail
          # xcodegen ships via Homebrew on GitHub's macOS runners; project.yml
          # is the committed source of truth, the .xcodeproj itself is not
          # committed here (unlike lumivault.app, which commits its .xcodeproj
          # directly -- HealthLoom deliberately regenerates it in CI instead,
          # to avoid .pbxproj merge conflicts across parallel work streams).
          brew install xcodegen
          xcodegen generate

      - name: Select an available iOS Simulator runtime
        id: sim
        if: steps.xcode27.outputs.available == 'true'
        run: |
          set -euo pipefail
          # Pick any available iPhone simulator; whichever iOS runtime the
          # runner's Xcode ships is fine as long as it satisfies the app's
          # deploymentTarget (27.0).
          udid=$(xcrun simctl list devices available \
            | grep -E 'iPhone' \
            | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}' \
            | head -n1)
          if [ -z "$udid" ]; then
            echo "::error::No available iPhone simulator found on this runner." >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      - name: Build + test HealthLoom scheme
        if: steps.xcode27.outputs.available == 'true'
        run: |
          set -euo pipefail
          dest="platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"
          xcodebuild build test \
            -project HealthLoom.xcodeproj \
            -scheme HealthLoom \
            -destination "$dest" \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES
